<div class="addMovie">
    <h4 class="addMovie__title"># Ajouter un film</h4>
    <form class="addMovie__form">
        
        <select name="categorie">
            <option value="1">Action</option>
            <option value="2">Comédie</option>
            <option value="3">Drame</option>
            <option value="4">Science-Fiction</option>
            <option value="5">Animation</option>
            <option value="6">Thriller</option>
            <option value="7">Horreur</option>
            <option value="8">Avanture</option>
            <option value="9">Fantaisie</option>
            <option value="10">Documentaire</option>
        </select>

        <input required type="text" name="realisateur" placeholder="Réalisateur" pattern="[^0-9]*" title="Numbers are not allowed">
        <textarea name="description" placeholder="Description" id=""></textarea>
        <input required type="text" name="titre" placeholder="Titre" title="Numbers are not allowed">
        <input required type="number" name="annee" placeholder="Année">
        <input required type="number" name="duree" placeholder="Durée">
        <input required type="text" name="nomfilm" placeholder="Nom du fichier de l'affiche" title="Numbers are not allowed">
        <input required type="text" name="trailer" placeholder="URL Trailer">
       <select name="restrictionage" id="">
        <option value="11">Tout public</option>
        <option value="12">interdit aux -7 ans</option>
        <option value="13">interdit aux -12 ans</option>
        <option value="14">interdit aux -18 ans</option>
       </select>
        <input onclick="{{handler}}" type="button" value="Ajouter" name="todo">

    </form>
</div>
