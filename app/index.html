<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { Favorite } from "./component/Favorite/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { DataFavorite } from "./data/dataFavorite.js";

      let profiles = await DataProfile.read();
      let currentFilteredMovies = null;
      let currentProfileId = null;
      let currentFavorites = null;
      let content = document.querySelector("#content");
      content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerDetail = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        V.renderMovieDetail(movie, currentFavorites);
      };

      C.handlerSelectProfile = async function(id) {
        if (!id) {
            currentFilteredMovies = null;
            currentProfileId = null;
            currentFavorites = null;
            C.handlerHome(); 
        }
        currentProfileId = id;
        let currentProfile = DataProfile.getProfile(id, profiles);
        currentFilteredMovies = await DataMovie.requestMovies(currentProfile.age_restriction);
        currentFavorites = await DataFavorite.request(id);
        
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

      C.handlerHome = function(){
        let content = document.querySelector("#content");
        if (currentFilteredMovies) {
            V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
        } 
        else {
            content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";
        }      
      }

    C.handlerLogout = function() {
        currentFilteredMovies = null; 
        
        C.handlerHome(); 
    };

      C.handlerAddFavorite = async function(id_movie) {
        await DataFavorite.add(currentProfileId, id_movie);
        alert("Film ajouté aux favoris ");
        currentFavorites = await DataFavorite.request(currentProfileId);
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

      C.handlerRemoveFavorite = async function(id_movie) {
        await DataFavorite.remove(currentProfileId, id_movie);
        alert("Film retiré des favoris ");
        currentFavorites = await DataFavorite.request(currentProfileId);
        V.renderFavoritesAndMovies(currentFavorites, currentFilteredMovies);
      };

    C.start = async function () {
      V.renderNavBar("C.handlerHome()", profiles, "C.handlerLogout()");
    };

    window.V = {};

    V.renderNavBar = function (hHome, profiles, hLogout) {
      let header = document.querySelector("#header");
      header.innerHTML = NavBar.format(hHome, profiles, hLogout);
    };

    V.renderMovie = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory.format(data);
    };

          V.renderFavoritesAndMovies = function(favorites, groupedMovies) {
          let content = document.querySelector("#content");
          let html = MovieCategory.format(groupedMovies);
          let favoritesHtml = Favorite.format(favorites);
          if (favoritesHtml) {
              html += favoritesHtml;
          }
          
          content.innerHTML = html;
      };
    V.renderMovieDetail = function (data, favorites = []) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data, favorites);
    };

    C.start();
    </script>
  </body>
</html>
<script type="module"></script>
