<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { DataProfile } from "./data/dataProfile.js";

      let profiles = await DataProfile.read();
      let currentFilteredMovies = null;
      content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerDetail = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        V.renderMovieDetail(movie);
      };

     C.handlerSelectProfile = async function(idp) {
        if (!idp) {
            currentFilteredMovies = null; 
            C.handlerHome(); 
        }
        let currentProfile = null;
        for (let p of profiles) {
        if (p.id == idp) {
            currentProfile = p; 
        }
      }
      currentFilteredMovies = await DataMovie.requestMovies(currentProfile.age_restriction);
        
      V.renderMovie(currentFilteredMovies);
      };

      C.handlerHome = function(){
        let content = document.querySelector("#content");
        if (currentFilteredMovies) {
            V.renderMovie(currentFilteredMovies);
        } 
        else {
            content.innerHTML = "<h2 style='text-align:center; padding: 3rem;'>Veuillez sélectionner un profil pour découvrir le catalogue.</h2>";
        }      
      }

    C.handlerLogout = function() {
        currentFilteredMovies = null; 
        
        C.handlerHome(); 
    };

    C.start = async function () {
      V.renderNavBar("C.handlerHome()", profiles, "C.handlerLogout()");
    };

    window.V = {};

    V.renderNavBar = function (hHome, profiles, hLogout) {
      let header = document.querySelector("#header");
      header.innerHTML = NavBar.format(hHome, profiles, hLogout);
    };

    V.renderMovie = function (data) {
        let content = document.querySelector("#content");
        let html = "";
        for (let categoryObj of data) {
            let moviesHtml = Movie.format(categoryObj.movies);
            html += MovieCategory.format(categoryObj.label, moviesHtml);
        }
          content.innerHTML = html;
    };

    V.renderMovieDetail = function (data) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(data);
    };

    C.start();
    </script>
  </body>
</html>
<script type="module"></script>
